defaults:
  - _self_
  - agent: sac

env: LunarLander-v3
action_repeat: 1

num_train_steps: 300000
num_seed_steps: 10000
eval_frequency: 10000
num_eval_episodes: 20

device: cuda

log_save_tb: false
save_video: false
log_frequency: 10000
experiment: discrete_sac

replay_buffer_capacity: 100000
batch_size: 256

seed: 1
discount: 0.99

hydra:
  run:
    dir: ./exp_local/${env}/${experiment}_seed_${seed}
