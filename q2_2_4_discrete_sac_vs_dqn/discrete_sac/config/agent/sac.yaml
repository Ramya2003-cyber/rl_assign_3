params:
  obs_dim: ???
  action_dim: ???
  action_range: ???
  device: ${device}
  critic_cfg: ${agent.params.critic}
  actor_cfg: ${agent.params.actor}
  discount: 0.99
  init_temperature: 0.1
  alpha_lr: 1e-4
  alpha_betas: [0.9, 0.999]
  actor_lr: 1e-4
  actor_betas: [0.9, 0.999]
  actor_update_frequency: 1
  critic_lr: 1e-4
  critic_betas: [0.9, 0.999]
  critic_tau: 0.005
  critic_target_update_frequency: 2
  batch_size: ${batch_size}
  learnable_temperature: true

  critic:
    hidden_dim: 256
    hidden_depth: 2

  actor:
    hidden_dim: 256
    hidden_depth: 2
    log_std_bounds: [-10, 2]
