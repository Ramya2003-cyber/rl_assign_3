_target_: agent.sac.SACAgent
params:
  # These are filled from the Gym environment in train.py.
  obs_dim: ???
  action_dim: ???
  action_range: ???
  device: ${device}
  critic_cfg: ${agent.params.critic}
  actor_cfg: ${agent.params.actor}
  discount: 0.99
  init_temperature: 0.1
  alpha_lr: 1e-4
  alpha_betas: [0.9, 0.999]
  actor_lr: 1e-4
  actor_betas: [0.9, 0.999]
  actor_update_frequency: 1
  critic_lr: 1e-4
  critic_betas: [0.9, 0.999]
  critic_tau: 0.005
  critic_target_update_frequency: 2
  batch_size: ${batch_size}
  learnable_temperature: true

  critic:
    _target_: agent.critic.DoubleQCritic
    params:
      obs_dim: ${agent.params.obs_dim}
      action_dim: ${agent.params.action_dim}
      hidden_dim: 1024
      hidden_depth: 2

  actor:
    _target_: agent.actor.DiagGaussianActor
    params:
      obs_dim: ${agent.params.obs_dim}
      action_dim: ${agent.params.action_dim}
      hidden_dim: 1024
      hidden_depth: 2
      log_std_bounds: [-10, 2]
