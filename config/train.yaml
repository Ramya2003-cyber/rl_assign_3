defaults:
  - agent: sac
  - _self_

env: pendulum_v1
experiment: test_exp

# Use plain integers to avoid "float object" errors
num_train_steps: 1000000
replay_buffer_capacity: 1000000

num_seed_steps: 5000
eval_frequency: 10000
num_eval_episodes: 20

device: cuda

# logger (your script uses DummyLogger, but keep these for safety)
log_frequency: 10000
log_save_tb: false
save_video: false

seed: 1

# Your custom parameters for run_pendulum.py
custom:
  target_angle: 90
  reward_scale: 1.0
  auto_tune: true
  alpha: 0.1

# Modern Hydra configuration
hydra:
  job:
    name: ${env}
  run:
    dir: runs/${now:%H%M%S}_${hydra.job.name}