# config/pebble_reacher.yaml
# Hydra configuration for run_pebble_reacher.py (Bonus: PEBBLE on Reacher)

defaults:
  - agent: sac
  - _self_

# ── Reward formulation ────────────────────────────────────────────────────────
reward_type: a          # override on CLI: reward_type=b  or  reward_type=c
seed: 1                 # override on CLI: seed=2

# ── Standard SAC training schedule ───────────────────────────────────────────
num_train_steps:    500000
num_seed_steps:      10000   # random exploration before any RM or gradient updates
eval_frequency:      10000   # evaluate ground-truth return every N steps
num_eval_episodes:      10   # episodes per checkpoint (fewer than SAC-only; faster)

replay_buffer_capacity: 1000000

# ── Hardware ─────────────────────────────────────────────────────────────────
device: cuda                  # 'cpu' if no GPU

# ── PEBBLE-specific hyper-parameters ─────────────────────────────────────────
pebble:
  # Teacher
  max_feedback: 2000          # total number of preference queries allowed
  equal_threshold: 1.0e-4    # |R1-R2| < threshold → tie (0.5 label)

  # Segment sampling
  seg_len: 50                 # length of each trajectory segment shown to teacher

  # Feedback schedule
  feedback_freq: 5000         # steps between consecutive RM update rounds
  queries_per_update: 20      # new queries asked per RM update round
  rm_pretrain_queries: 100    # queries used during the initial pre-training phase

  # Reward model training
  rm_epochs: 50               # gradient epochs per RM update (after pre-training)
  rm_pretrain_epochs: 200     # gradient epochs for the initial pre-train
  rm_batch_size: 64           # batch size for RM training
  rm_hidden_dim: 256          # hidden layer width
  rm_lr: 3.0e-4               # Adam learning rate for RM
  pref_buffer_capacity: 5000  # max preference pairs to keep in the dataset

# ── Hydra output directory ────────────────────────────────────────────────────
hydra:
  job:
    name: pebble_reacher_${reward_type}
  run:
    dir: runs/pebble/${now:%H%M%S}_${reward_type}_seed${seed}
